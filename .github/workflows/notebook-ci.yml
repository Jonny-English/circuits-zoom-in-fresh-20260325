name: Course CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Render README tables and regenerate course notebooks
        run: |
          python3 scripts/render_readmes.py
          python3 scripts/generate_course_notebooks.py

      - name: Validate course metadata and mirrored structure
        run: |
          python3 scripts/validate_course.py
          python3 scripts/check_links.py

      - name: Audit realtime policy
        run: |
          python3 scripts/audit_realtime_policy.py

      - name: Smoke test generated notebooks
        env:
          MPLBACKEND: Agg
        run: |
          python3 scripts/smoke_notebooks.py
